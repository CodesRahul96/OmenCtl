<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <policy user="root">
    <allow own="com.yyl.hpmanager.power"/>
  </policy>
  <!-- Only allow the physically logged-in console user to access the service -->
  <policy context="default">
    <deny send_destination="com.yyl.hpmanager.power"/>
    <deny receive_sender="com.yyl.hpmanager.power"/>
  </policy>
  <policy at_console="true">
    <allow send_destination="com.yyl.hpmanager.power"/>
    <allow receive_sender="com.yyl.hpmanager.power"/>
  </policy>
</busconfig>
